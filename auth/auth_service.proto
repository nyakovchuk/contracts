syntax="proto3";

package auth;
option go_package="github.com/nyakovchuk/contracts/auth/go;auth";

import "google/protobuf/empty.proto";
import "auth_model.proto";

service Auth {
    rpc Register(RegisterRequest) returns (google.protobuf.Empty);
    rpc Login(LoginRequest) returns (TokenPair);
    rpc RefreshToken(RefreshRequest) returns (TokenPair);
    rpc Validate(ValidateRequest) returns (ValidateResponse);
    rpc Logout(RefreshRequest) returns (google.protobuf.Empty);
    rpc DeleteUser(DeleteRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
    string login = 1;
    string email = 2;
    string password = 3;
}

message DeleteRequest {
    uint64 id = 1;
}

message LoginRequest {
    string login_or_email = 1;
    string password = 2;
}

message LoginResponse {
    TokenPair token_pair = 1;
}

message LogoutRequest {
    string refresh_token = 1;
}

message RefreshRequest {
    string refresh_token = 1;
}

message RefreshResponse {
    TokenPair token_pair= 1;
}

message ValidateRequest {
    string access_token = 1;
}

message ValidateResponse {
    uint64 user_id = 1;
}